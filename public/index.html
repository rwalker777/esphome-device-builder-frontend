<!doctype html>
<html lang="en" class="wa-brand-cyan">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#038fc7" />
    <!--
      Content-Security-Policy - defense in depth against any future
      XSS that slips past Lit's auto-escaping. Catches injected
      <script src="https://evil.com/...">, eval() of attacker text,
      and reparenting via <base>. Not a substitute for sanitising
      user content; it's the second wall.

      Trade-offs we live with today:
        * style-src 'unsafe-inline' - required by three things in
          our bundle today:
            - The inline <style> block below in this index.html.
            - Lit's style-map / styleMap directive emits inline
              style="..." attributes; CSP style-src covers those.
            - styles/apply-theme.ts builds <style> elements at
              runtime via document.createElement("style") and
              appends them to the document for the active theme;
              one component (table-row-menu.ts) also assigns
              element.style.cssText. Both are inline styles per
              CSP, even though the markup never appears in the
              source HTML.
          Tightening (drop 'unsafe-inline', hash the static block,
          migrate style-map and the theme injector to constructable
          stylesheets) is tracked as a follow-up - see
          esphome/device-builder#120.
        * img-src 'self' data: https: - the yaml-editor squiggle
          markers and MDI icon paths build data: URIs at runtime;
          board catalog images come from vendor CDNs (espressif,
          m5stack, olimex, shopify, etc.) so the img-src has to
          allow https: globally. Images can't execute code, so the
          worst-case loosening is letting an XSS load tracking
          pixels - acceptable for a local dashboard.
        * font-src data: - same data:-URI shape as the icons.
        * connect-src 'self' ws: wss: data: https://schema.esphome.io
          - explicit connect-src governs fetch / XHR / WebSocket /
          EventSource / Beacon (default-src is NOT consulted once
          connect-src is set). The dashboard's WS is always built
          same-origin (api/esphome-api.ts:
          `${protocol}//${location.host}/ws`), so 'self' alone would
          cover the default deployments (port-6052 direct, ESPHome
          Desktop, HA add-on via Ingress, single-hostname nginx
          reverse proxy). The ws: / wss: openers are a deliberate
          compromise to keep split-hostname proxy setups
          (ws.api.example.com + dash.example.com) working without
          operator intervention - those have been a recurring pain
          point on the legacy dashboard. Trade-off: an XSS in our
          bundle could exfiltrate via a WebSocket to an attacker
          origin. fetch and XHR over http(s) stay restricted to
          'self' by the same connect-src rule (the ws:/wss:/data:
          scheme openers don't widen the http(s) origin allowlist).
          data: is needed because WebAwesome's icon resolver
          fetches MDI path SVGs we register at runtime via fetch()
          against a data: URI we build ourselves. Loud injection
          paths stay blocked - script-src falls back to default-src
          'self' so <script src="https://evil.com/..."> can't load.
          https://schema.esphome.io is the *typed* schema bundle
          the YAML editor's autocompletion fetches lazily for
          ``on_*`` triggers and the per-component action /
          condition / filter / effects registries that
          ``components.json`` flattens away. Read-only JSON; no
          credentials or upload paths. Failures gracefully degrade
          to the catalog-only completion - util/esphome-schema.ts
          treats every error path as ``null`` and the editor still
          completes config-vars from the dashboard's own catalog.
        * No frame-ancestors directive - HA Ingress iframes us from
          a different origin (homeassistant.local), so locking
          framing would break the add-on. Browser default (allow
          all) leaves clickjacking unblocked; operators behind a
          reverse proxy can add their own frame-ancestors via
          response headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' ws: wss: data: https://schema.esphome.io; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>ESPHome</title>
    <!-- Backend rewrites ``__ESPHOME_BASE_HREF__`` per-request to
         the deployment prefix; values MUST end with a trailing
         slash so a relative URL like ``app.HASH.js`` resolves
         against the prefix-as-directory:
             ``/`` (direct deploy)
             ``/api/hassio_ingress/<token>/`` (HA add-on)
             ``/dashboard/`` (reverse-proxy subpath)
         A trailing-slash-less ``/api/hassio_ingress/<token>``
         would resolve ``app.HASH.js`` to
         ``/api/hassio_ingress/app.HASH.js`` and break loading.
         All relative URLs below — including the deferred app
         bundle that rspack emits with ``publicPath: "auto"`` —
         resolve against this base, so a hard-reload of a deep
         SPA URL like ``/device/<id>`` doesn't ask the server for
         ``/device/app.<hash>.js`` (which the SPA fallback would
         answer with HTML and the browser would white-screen on).
         The placeholder is the contract the backend's
         ``_shell_html`` substitutes — see esphome/device-builder's
         ``_resolve_base_href`` for the canonical implementation
         (always returns leading + trailing slashes). The rspack
         dev server pre-substitutes the placeholder to ``"/"`` at
         build time (``build-scripts/rspack.cjs``); only the prod
         wheel ships with the literal placeholder for the backend
         to fill. -->
    <base href="__ESPHOME_BASE_HREF__" />
    <!-- Favicon href is set at runtime from entrypoint.ts via
         ``withBase("/assets/logo/esphome.svg")`` so it resolves
         correctly under any mount point — including HA ingress
         and direct deep links like ``/device/<id>`` (which the
         SPA serves the same ``index.html`` for, so a static
         document-relative URL would resolve against the route). -->
    <link rel="icon" type="image/svg+xml" />
    <style>
      :root,
      .wa-light,
      .wa-dark .wa-invert {
        --wa-color-brand-fill-loud: var(--primary-color, #009fee);
        --wa-color-brand-on-loud: var(--text-primary-color, #ffffff);
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--wa-color-surface-default, #f8f9fa);
        color: var(--wa-color-text-normal, #212529);
      }
    </style>
  </head>
  <body>
    <esphome-app></esphome-app>
  </body>
</html>
