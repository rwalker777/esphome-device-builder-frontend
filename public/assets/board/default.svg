<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Chip body -->
  <rect x="30" y="30" width="60" height="60" rx="6" fill="#37474F" stroke="#546E7A" stroke-width="2"/>
  <!-- Inner die -->
  <rect x="42" y="42" width="36" height="36" rx="3" fill="#455A64" stroke="#607D8B" stroke-width="1"/>
  <!-- Die marking -->
  <circle cx="60" cy="60" r="8" fill="#546E7A"/>
  <circle cx="60" cy="60" r="4" fill="#607D8B"/>
  <!-- Pin 1 marker -->
  <circle cx="38" cy="38" r="2" fill="#78909C"/>
  <!-- Top pins -->
  <rect x="40" y="20" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="50" y="20" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="60" y="20" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="70" y="20" width="4" height="12" rx="1" fill="#78909C"/>
  <!-- Bottom pins -->
  <rect x="40" y="88" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="50" y="88" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="60" y="88" width="4" height="12" rx="1" fill="#78909C"/>
  <rect x="70" y="88" width="4" height="12" rx="1" fill="#78909C"/>
  <!-- Left pins -->
  <rect x="20" y="40" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="20" y="50" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="20" y="60" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="20" y="70" width="12" height="4" rx="1" fill="#78909C"/>
  <!-- Right pins -->
  <rect x="88" y="40" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="88" y="50" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="88" y="60" width="12" height="4" rx="1" fill="#78909C"/>
  <rect x="88" y="70" width="12" height="4" rx="1" fill="#78909C"/>
</svg>
