# With `blank_issues_enabled: false` and no issue templates defined,
# the new-issue chooser shows nothing but these contact links — users
# are funnelled straight to the right tracker. Maintainers can still
# open issues directly via the /issues/new URL when needed.
blank_issues_enabled: false
contact_links:
  - name: 🐛 Report a bug
    url: https://github.com/esphome/device-builder-dashboard-backend/issues/new?labels=bug
    about: |
      All bug reports — UI included — go on the backend tracker so
      we can triage in one place.

  - name: 💡 Request a feature
    url: https://github.com/esphome/device-builder-dashboard-backend/issues/new?labels=enhancement
    about: |
      Have an idea? File it on the backend tracker.

  - name: 💬 ESPHome Discord
    url: https://discord.gg/KhAMKrd
    about: Chat with users and contributors in real time.
