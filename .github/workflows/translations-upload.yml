name: Upload translations

# Push the English source strings to Lokalise whenever en.json lands on
# main, so translators always see the latest keys. Only new keys are
# added; existing translations are left untouched (see
# build-scripts/translations.ts).

on:
  push:
    branches: [main]
    paths:
      - "src/translations/en.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24.x"

# Serialize uploads so two quick pushes can't race the same project.
concurrency:
  group: lokalise-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Upload base strings to Lokalise
    runs-on: ubuntu-latest
    # The Lokalise credentials live in the `lokalise` environment.
    environment: lokalise
    # Forks can't read the secret; skip there so the job doesn't fail noisily.
    if: github.repository == 'esphome/device-builder-frontend'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upload to Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: npm run translations:upload
